<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>found · poem</title>
  <!-- elegant font for poem -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ---------- pure black base with color hints ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;           /* perfect on mobile */
      background: #000000;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    /* main container – black with violet/green atmospheric hues */
    .vine-world {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000000;
      /* soft color hints – no hard shapes, just atmosphere */
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(140, 70, 200, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 70%, rgba(70, 130, 70, 0.15) 0%, transparent 55%),
        #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;  /* player top, poem bottom */
      padding: 2rem 1.5rem 2.5rem 1.5rem;
    }

    /* ----- TOP: music player (improved wave) ----- */
    .top-music {
      position: relative;
      z-index: 20;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 1rem;
    }

    /* minimal music pod – only glow, no borders */
    .music-pod {
      background: rgba(20, 18, 28, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 140px;
      padding: 0.8rem 1.8rem 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      box-shadow: 0 0 40px rgba(150, 80, 200, 0.25), 0 0 15px rgba(90, 160, 90, 0.2);
      border: none;
    }

    .play-gem {
      background: rgba(240, 220, 255, 0.08);
      border: none;
      color: #f0e2ff;
      width: 56px;
      height: 56px;
      border-radius: 100px;
      font-size: 2.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 30px #9f6ee0;
      line-height: 1;
      backdrop-filter: blur(4px);
    }

    .play-gem:hover {
      background: rgba(255, 240, 255, 0.2);
      color: #ffffff;
      box-shadow: 0 0 50px #c08aff;
    }

    /* wave container – more dynamic, better looking */
    .wave-bars {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 44px;
    }

    .wave-bar {
      width: 5px;
      height: 18px;
      background: linear-gradient(180deg, #c79eff, #b8da8c);
      border-radius: 30px;
      opacity: 0.95;
      transition: height 0.15s cubic-bezier(0.2, 0.9, 0.3, 1.3);
      box-shadow: 0 0 18px #c59aff, 0 0 8px #9fd08b;
    }

    /* make bars look richer */
    .wave-bar:nth-child(odd) {
      background: linear-gradient(180deg, #dbb0ff, #aec978);
    }
    .wave-bar:nth-child(3) {
      background: linear-gradient(180deg, #c286ff, #c2da87);
    }

    /* ----- BOTTOM: scrollable poem area (no borders, elegant font) ----- */
    .bottom-poem {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1rem;
      /* allow scrolling if content overflows */
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 6px; /* space for scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #7a5a9c #1a1120;
    }

    /* custom scrollbar for webkit (mobile often hides, but for consistency) */
    .bottom-poem::-webkit-scrollbar {
      width: 4px;
    }
    .bottom-poem::-webkit-scrollbar-track {
      background: #1a1120;
      border-radius: 10px;
    }
    .bottom-poem::-webkit-scrollbar-thumb {
      background: #7a5a9c;
      border-radius: 10px;
    }

    /* poem style – Cormorant Garamond, soft glowing */
    .poem {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(1.3rem, 6vw, 1.9rem);
      line-height: 1.6;
      color: rgba(255, 245, 255, 0.95);
      text-shadow: 0 0 25px #a27bcb, 0 2px 10px #1d331d;
      white-space: pre-line;
      text-align: left;
      word-break: break-word;
      padding: 0.2rem 0.5rem 1rem 0.5rem;
      background: transparent;
      border: none;
      letter-spacing: 0.3px;
      font-weight: 350;
    }

    /* tiny hint */
    .tiny-note {
      font-size: 0.7rem;
      color: #7a6b8c;
      text-align: center;
      margin-top: 0.8rem;
      background: transparent;
    }

    /* no borders or cards */
    *:focus, *:active {
      outline: none;
    }

    hr, .border, .vine-border, .poem-scroll {
      border: none;
      background: none;
    }

    /* color hints also in background (already added) – ensure soft */
  </style>
</head>
<body>
  <div class="vine-world">
    <!-- TOP: music player (improved wave) -->
    <div class="top-music">
      <div class="music-pod">
        <div class="play-gem" id="playToggle" role="button" tabindex="0" aria-label="play/stop">▶</div>
        <div class="wave-bars" id="visualizer">
          <div class="wave-bar" id="bar1"></div>
          <div class="wave-bar" id="bar2"></div>
          <div class="wave-bar" id="bar3"></div>
          <div class="wave-bar" id="bar4"></div>
          <div class="wave-bar" id="bar5"></div>
          <div class="wave-bar" id="bar6"></div>
          <div class="wave-bar" id="bar7"></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM: scrollable poem (elegant font) -->
    <div class="bottom-poem">
      <div class="poem">
"On the vine grew grapes,
sweet and tart.

Crawled snail, caterpillar;
flew unto, ladybug.

On the vine grew leaf:
green, yellow, lax and
stiff. Young and old.

Woven into each other,
whispering the cradle of
life.

Withered, it left the longing.

On the vine."
      </div>
      <div class="tiny-note" id="autoplayHint"></div>
    </div>

    <!-- audio element (song.mp3) -->
    <audio id="song" loop preload="auto">
      <source src="song.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    (function() {
      const audio = document.getElementById('song');
      const playBtn = document.getElementById('playToggle');
      const bars = [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3'),
        document.getElementById('bar4'),
        document.getElementById('bar5'),
        document.getElementById('bar6'),
        document.getElementById('bar7')
      ];
      const hint = document.getElementById('autoplayHint');

      let isPlaying = false;
      let audioContext = null;
      let analyser = null;
      let source = null;
      let animationFrame = null;

      // ---- beautiful, dynamic wave (even without analyser) ----
      function startFancyWave() {
        if (!isPlaying) return;
        const now = Date.now() / 400; // smoother, faster movement
        for (let i = 0; i < bars.length; i++) {
          // richer harmonics: multiple sin/cos layers
          let val = 16 
            + Math.sin(now + i * 0.9) * 14 
            + Math.cos(now * 1.3 + i * 1.8) * 8
            + Math.sin(now * 2.1 - i) * 5;
          // make each bar slightly different
          val = val * (0.9 + 0.2 * Math.sin(i * 2.3));
          bars[i].style.height = Math.max(10, Math.min(52, val)) + 'px';
        }
        animationFrame = requestAnimationFrame(startFancyWave);
      }

      // ---- real analyser (if supported) for authentic wave ----
      function initAnalyser() {
        if (audioContext) return;
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 128; // finer resolution
          source = audioContext.createMediaElementSource(audio);
          source.connect(analyser);
          analyser.connect(audioContext.destination);
        } catch (e) {
          analyser = null;
        }
      }

      function startRealWave() {
        if (!analyser) {
          startFancyWave();
          return;
        }
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function update() {
          if (!isPlaying) return;
          analyser.getByteFrequencyData(dataArray);
          for (let i = 0; i < bars.length; i++) {
            // map to interesting frequencies (avoid lows only)
            let index = Math.floor(i * (dataArray.length / bars.length) * 0.7) + 2; // shift a bit
            if (index >= dataArray.length) index = dataArray.length - 1;
            let raw = dataArray[index] || 80;
            // more dynamic scaling
            let height = Math.max(12, Math.min(58, raw / 2.2 + 6 * Math.sin(i + Date.now()/300)));
            bars[i].style.height = height + 'px';
          }
          animationFrame = requestAnimationFrame(update);
        }
        update();
      }

      function stopWave() {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        // reset to calm, low state
        bars.forEach(b => b.style.height = '14px');
      }

      // toggle play/pause
      function togglePlay() {
        if (isPlaying) {
          audio.pause();
          playBtn.textContent = '▶';
          isPlaying = false;
          stopWave();
        } else {
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();
          audio.play().then(() => {
            playBtn.textContent = '⏸';
            isPlaying = true;
            if (!analyser && !audioContext) {
              try { initAnalyser(); } catch (e) {}
            }
            startRealWave(); // will fallback to fancy if analyser missing
            hint.textContent = '';
          }).catch(() => {
            hint.textContent = 'tap play to hear the vine';
          });
        }
      }

      playBtn.addEventListener('click', togglePlay);
      playBtn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') togglePlay();
      });

      // autoplay attempt (blocked, show hint)
      audio.volume = 0.6;
      let auto = audio.play();
      if (auto !== undefined) {
        auto.then(() => {
          isPlaying = true;
          playBtn.textContent = '⏸';
          initAnalyser();
          startRealWave();
        }).catch(() => {
          hint.textContent = '▶ touch to awaken';
        });
      }

      // initialize calm bars
      window.addEventListener('load', () => {
        bars.forEach(b => b.style.height = '14px');
      });

      // cleanup
      window.addEventListener('beforeunload', () => {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });
    })();
  </script>
</body>
</html>
